services:
  - type: web
    name: pricecheck-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHOIS_API_KEY
        sync: false
      - key: URLSCAN_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
